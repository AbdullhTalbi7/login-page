<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <style>
        body{
            background-color: #f4f4f4;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card{
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1{    
           text-align: center;
        }
        input{
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 5px;
            margin: 5px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover{
            background: darkblue;
        }
        a{
             display: inline-block;
            margin-top: 10px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Login</h1>
        <input type="email" id="email"  placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <p id="massage"></p>
        <a href="">نسيت كلمة المرور؟</a>
        <button onclick="login()">دخول</button>
        <button>sign in</button>
    </div>

    <script>
        function login(){
            var email = document.getElementById("email").value;
            var password = document.getElementById("password").value;
            var massage = document.getElementById("massage");

            if (email === "" || password === ""){
                massage.innerText = "الرجاء ادخل كل البيانات";
                massage.style.color = "red";
            }else if(!email.includes("@")){
                massage.innerText = "الايميل غير صحيح";
                massage.style.color = "red";
            }else if(password.length < 6){
                massage.innerText = "كلمة المرور قصيرة";
                massage.style.color = "red";
            }
            else{
                massage.innerText = "تم تسجيل الدخول بنجاح";
                massage.style.color = "green";
            }
        }
    </script>
</body>
</html>
